name: Daily XKCD Scraper

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-xkcd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r xkcd_scraper/requirements.txt

      - name: Run XKCD scraper
        run: python xkcd_scraper/xkcd_scraper.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xkcd_scraper/comics/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat(xkcd): update daily comic [$(date +%Y-%m-%d)]"
            git push
          fi
